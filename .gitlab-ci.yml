image: node:20

# Deploys to GitLab Pages on push to the default branch.
# Add these under Settings → CI/CD → Variables (both must keep the VITE_ prefix so Vite
# injects them into the client build):
#   VITE_TELEGRAM_BOT_TOKEN   — the Telegram bot token
#   VITE_TELEGRAM_CHAT_ID     — the destination chat id
# GitLab injects project CI/CD variables into the job automatically, so `npm run build` sees them.
pages:
  stage: deploy
  script:
    - npm ci
    - npm test
    - npm run build
    - rm -rf public && mv dist public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
